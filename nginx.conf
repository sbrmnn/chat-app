server {
    listen 80;
    server_name toonabi.com www.toonabi.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name toonabi.com www.toonabi.com;

    ssl_certificate /etc/letsencrypt/live/toonabi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toonabi.com/privkey.pem;

    root /var/www/toonabi/frontend/dist;
    index index.html;

    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/octet-stream model/gltf-binary;

    # Serve frontend static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.vrm$ {
        gzip_static on;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary Accept-Encoding;
    }

    # Proxy API requests to Rails
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
